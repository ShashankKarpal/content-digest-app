<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Content Digest Capture — Settings</title>
<style>
  body { font-family: 'Montserrat', -apple-system, system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; max-width: 520px; margin: 40px auto; padding: 0 20px; }
  h1 { color: #ff6b35; font-size: 20px; }
  label { display: block; margin: 18px 0 6px; font-size: 13px; color: #aaa; }
  input { width: 100%; box-sizing: border-box; background: #1e1e1e; border: 1px solid #333; color: #e0e0e0; padding: 9px 12px; border-radius: 8px; font-size: 13px; outline: none; }
  input:focus { border-color: #ff6b35; }
  button { margin-top: 20px; background: #ff6b35; border: none; color: #000; padding: 10px 22px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
  #status { margin-left: 12px; font-size: 13px; color: #22c55e; }
  .hint { font-size: 11px; color: #666; margin-top: 4px; }
</style>
</head>
<body>
<h1>Content Digest Capture</h1>
<label for="server">Server URL</label>
<input type="text" id="server" placeholder="http://100.112.78.47:7778">
<div class="hint">Your always-on Content Digest server (M1). Include the port.</div>
<label for="token">Auth token</label>
<input type="password" id="token" placeholder="Bearer token from secrets.json">
<div class="hint">Same auth_token value as in ~/content-digest-app/secrets.json on the server.</div>
<button id="save">Save</button><span id="status"></span>
<script src="options.js"></script>
</body>
</html>
