<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Content Digest</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Montserrat', -apple-system, system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #1a1a2e; color: #e0e0e0; }
  h1 { color: #ff6b35; margin-bottom: 4px; font-size: 24px; }
  .subtitle { color: #888; font-size: 14px; margin-bottom: 20px; }
  .filters { position: sticky; top: 0; background: #1a1a2e; padding: 12px 0; border-bottom: 1px solid #333; z-index: 10; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filters button { padding: 6px 14px; border: 1px solid #444; border-radius: 16px; background: transparent; color: #ccc; cursor: pointer; font-size: 13px; transition: all 0.2s; }
  .filters button:hover { border-color: #ff6b35; color: #ff6b35; }
  .filters button.active { background: #ff6b35; border-color: #ff6b35; color: white; }
  .filters select { padding: 6px 10px; border: 1px solid #444; border-radius: 8px; background: #16213e; color: #ccc; font-size: 13px; margin-left: auto; }
  .item { background: #16213e; padding: 15px; margin: 12px 0; border-radius: 8px; border-left: 3px solid #ff6b35; position: relative; }
  .item h3 { color: #e0e0e0; font-size: 15px; padding-right: 30px; margin-bottom: 6px; }
  .item h3 a { color: #e0e0e0; text-decoration: none; }
  .item h3 a:hover { color: #4ecdc4; }
  .meta { color: #888; font-size: 12px; margin: 4px 0 8px; }
  .summary { color: #ccc; font-size: 14px; line-height: 1.6; margin-bottom: 16px; }
  .action-points { margin-top: 16px; margin-bottom: 12px; }
  .tags { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { padding: 2px 8px; background: #333; color: #aaa; border-radius: 10px; font-size: 11px; }
  .cat-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; background: #333; color: #aaa; margin-right: 6px; }
  .dismiss { position: absolute; top: 12px; right: 12px; width: 26px; height: 26px; border: none; border-radius: 50%; background: transparent; color: #666; cursor: pointer; font-size: 16px; transition: all 0.2s; }
  .dismiss:hover { background: #ff4444; color: white; }
  .empty { text-align: center; color: #666; margin-top: 60px; }
  .empty p { font-size: 18px; margin-bottom: 8px; }
</style>
</head>
<body>
<h1>Content Digest</h1>
<p class="subtitle"><span id="count">3</span> items saved</p>
<div class="filters">
  <button class="active" data-cat="all">All</button>
  <button data-cat="Work">Work</button>
  <button data-cat="Learning">Learning</button>
  <button data-cat="Entertainment">Entertainment</button>
  <button data-cat="News">News</button>
  <button data-cat="Ideas">Ideas</button>
  <select id="sort-select">
    <option value="date">Sort: Newest</option>
    <option value="relevance">Sort: Relevance</option>
  </select>
</div>
<div id="items-container"></div>
<div class="empty" id="empty-state" style="display:none">
  <p>No items yet</p>
  <span>Add URLs from the menu bar app to get started.</span>
</div>
<script>
const DATA = [{"url": "https://www.linkedin.com/posts/poonam-soni-9255931b2_jobpreparation-remotejobs-websites-share-7446879610295971840-D3Ka?utm_source=share&utm_medium=member_ios&rcm=ACoAAAUMQNMBLNBjItw0-7uvom-cKcQaIDoWdDU", "title": "Open Sourced Complete Claude Code Setup for Job Preparation", "summary": "Poonam Soni shares an open-sourced comprehensive setup of the most complete and versatile AI tool ecosystem ever built. This resource is particularly beneficial for individuals new to AI tools like Claude Code, offering a full range of agents and skills in one place. The post highlights how this setup can save weeks of initial configuration time and provides insights on selecting only necessary components based on individual workflow needs. It also encourages users to focus more on their ideas and problem-solving rather than the size of their toolkit. This resource is valuable for professionals preparing for remote jobs, exploring AI tools, and enhancing productivity.", "action_points": ["Explore the open-sourced setup for a comprehensive understanding of AI tool capabilities.", "Install and experiment with different skills to identify those that fit your workflow best.", "Focus on problem-solving and idea generation rather than accumulating numerous tools."], "category": "Work", "tags": ["jobpreparation", "remotejobs", "websites", "aitools", "chatgpt"], "relevance": 3, "saved_at": "2026-04-07T07:53:21.285892"}, {"url": "https://www.linkedin.com/posts/cole-medin-727752184_karpathys-llm-knowledge-bases-post-went-share-7447022232234758146-O3IB?utm_source=share&utm_medium=member_ios&rcm=ACoAAAUMQNMBLNBjItw0-7uvom-cKcQaIDoWdDU", "title": "Karpathy's LLM Knowledge Bases and Its Viral Impact", "summary": "This post discusses the viral success of Karpathy's LLM Knowledge Bases, which transforms raw documents into structured wikis for efficient querying. The key points include the process of compiling or distilling knowledge versus using Retrieval-Augmented Generation (RAG) methods. As context windows expand in models, compiling becomes more appealing but faces scalability issues with large runtime corpora. Cole Medin shares a YouTube breakdown and GitHub repo for his Karpathy-inspired Claude Code memory system. This post highlights the ongoing debate between different approaches to handling document processing and knowledge retrieval in LLMs.", "action_points": ["Explore Karpathy's approach to transforming raw documents into structured wikis.", "Consider the trade-offs between compiling knowledge versus using RAG methods.", "Check out Cole Medin's YouTube breakdown and GitHub repo for insights on his Claude Code memory system."], "category": "Ideas", "tags": ["LLM", "Knowledge Bases", "Artificial Intelligence", "Machine Learning", "Data Processing"], "relevance": 3, "saved_at": "2026-04-07T07:51:47.214969"}, {"url": "https://www.linkedin.com/feed/update/urn:li:activity:7445889349021265920/", "title": "Claude Skill to Stop AI from Writing Like AI", "summary": "Jenna Potter shares a new skill she built called 'Stop AI Slop with Claude,' designed to prevent AI-generated content from sounding too robotic or repetitive. The post discusses the challenges of maintaining authenticity in brand messaging and how this tool helps address those issues. It also highlights user comments that reflect on the difficulty of keeping up with evolving guidelines for AI content creation, emphasizing the importance of human oversight and creativity.", "action_points": ["Learn about tools to improve AI-generated content quality", "Understand the challenges of maintaining authenticity in brand messaging", "Explore how human oversight can enhance AI-generated content"], "category": "Learning", "tags": ["AI", "Content Creation", "Brand Messaging", "Human Oversight", "Claude Skill"], "relevance": 3, "saved_at": "2026-04-07T07:03:17.539540"}];
let currentFilter = "all", currentSort = "date";
function escapeHtml(s) { const d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }
function render() {
  let items = [...DATA];
  if (currentFilter !== "all") items = items.filter(i => i.category === currentFilter);
  if (currentSort === "date") items.sort((a, b) => (b.saved_at || "").localeCompare(a.saved_at || ""));
  else items.sort((a, b) => (b.relevance || 0) - (a.relevance || 0));
  const container = document.getElementById("items-container");
  const empty = document.getElementById("empty-state");
  if (items.length === 0) { container.innerHTML = ""; empty.style.display = "block"; return; }
  empty.style.display = "none";
  container.innerHTML = items.map(item => {
    const tags = (item.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join("");
    const date = item.saved_at ? new Date(item.saved_at).toLocaleDateString() : "";
    return `<div class="item" data-url="${escapeHtml(item.url)}">
      <button class="dismiss" onclick="dismissItem(this)" title="Remove">&times;</button>
      <h3><a href="${item.url}" target="_blank">${escapeHtml(item.title)}</a></h3>
      <div class="meta"><span class="cat-tag">${item.category}</span>${date}</div>
      <p class="summary">${escapeHtml(item.summary)}</p>
      ${(item.action_points && item.action_points.length) ? `<div class="action-points"><strong style="color:#ff9f1c;font-size:13px;">Action Pointers</strong><ul style="margin-top:6px;padding-left:18px;color:#ccc;font-size:13px;line-height:1.8">${item.action_points.map(a => `<li>${escapeHtml(a)}</li>`).join("")}</ul></div>` : ""}
      <div class="tags">${tags}</div>
    </div>`;
  }).join("");
}
function dismissItem(btn) {
  const card = btn.closest(".item");
  const idx = DATA.findIndex(i => i.url === card.dataset.url);
  if (idx !== -1) DATA.splice(idx, 1);
  card.remove();
  document.getElementById("count").textContent = DATA.length;
  if (DATA.length === 0) document.getElementById("empty-state").style.display = "block";
}
document.querySelectorAll(".filters button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.cat;
    render();
  });
});
document.getElementById("sort-select").addEventListener("change", e => { currentSort = e.target.value; render(); });
render();
</script>
</body>
</html>
